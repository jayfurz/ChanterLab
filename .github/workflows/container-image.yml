name: Publish ChanterLab Container

# BASE-02: publication now depends on Unified Required CI (required-gate)
# succeeding for this EXACT commit, rather than firing independently on every
# push to main. Before this change, a push to main built and published an
# image tagged with that SHA regardless of whether required-gate had run or
# passed for it yet — branch protection only blocked the PR *merge*, not this
# workflow, so a red main (however that happened) could still get an image
# published. workflow_run with head_sha pinned closes that gap: this fires
# only after Unified Required CI completes on main, and it checks out (and
# tags) the exact SHA that workflow ran against, not whatever main points to
# by the time this job starts.
on:
  workflow_run:
    workflows: ["Unified Required CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA to build and publish (defaults to the default branch HEAD for a manual run)"
        required: false

permissions:
  contents: read

concurrency:
  group: chanterlab-container-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ vars.GITEA_REGISTRY }}/${{ vars.GITEA_REGISTRY_OWNER }}/chanterlab-web
  # workflow_run: only the exact SHA that Unified Required CI ran against, and
  # only if it concluded successfully. workflow_dispatch: the SHA the user
  # asked for, or the default branch HEAD if they didn't (this is a manual
  # override outside the automated gate, same as before).
  TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.event.inputs.sha || github.sha }}

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the exact gated SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Manual one-time provisioning outside this PR: create TAILSCALE_AUTHKEY
      # in the Tailscale admin console as a reusable, ephemeral, tagged key
      # (for example tag:ci), and restrict that tag to the Gitea registry using
      # least-privilege tailnet policy. Store the key as a repository secret.
      - name: Connect to the Gitea tailnet
        uses: tailscale/github-action@v4.1.1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # Manual one-time provisioning outside this PR: create the repository
      # secret GITEA_REGISTRY_TOKEN and the GITEA_REGISTRY (set to
      # git.lab.alwaysdobetterllc.com), GITEA_REGISTRY_OWNER, and
      # GITEA_REGISTRY_USERNAME repository variables.
      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GITEA_REGISTRY }}
          username: ${{ vars.GITEA_REGISTRY_USERNAME }}
          password: ${{ secrets.GITEA_REGISTRY_TOKEN }}

      - name: Build and push SHA-tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.TARGET_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI / Deploy Pages

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Group per ref so PR runs don't serialize behind one another or behind
  # default-branch deploys; in-flight deploys are never cancelled.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Rust tests (all features)
        # --all-features covers the worklet FFT detector and serde
        # serialization tests, which the default feature set skips.
        run: cargo test --all-features

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: JS score-engine tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    # Only build/deploy the site on pushes to the default branch, not on PRs.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site if it doesn't exist yet (uses the
          # workflow's pages: write permission). Without this the deploy fails
          # with "Get Pages site failed ... Not Found" on a repo that has
          # never had Pages enabled.
          enablement: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Build WASM
        run: make build

      - name: Disable Jekyll
        run: touch web/.nojekyll

      # Pages deploys the legacy Byzantine engine only (see README.md and
      # docs/plans/00-baseline/01-branch-and-deployment.md). web/training is a
      # committed symlink into the training-prototype product app; build the
      # Pages artifact from a staging copy with that path removed so the
      # product can never ship on this site by accident, even though the
      # symlink stays in the repo for local/production serving.
      - name: Stage Pages artifact without the training app
        run: |
          rm -rf /tmp/pages-artifact
          cp -a web /tmp/pages-artifact
          rm -f /tmp/pages-artifact/training
          if [ -e /tmp/pages-artifact/training ]; then
            echo "web/training still present in the Pages staging copy — refusing to deploy" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

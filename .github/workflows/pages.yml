name: CI / Deploy Pages

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Group per ref so PR runs don't serialize behind one another or behind
  # default-branch deploys; in-flight deploys are never cancelled.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Rust tests (all features)
        # --all-features covers the worklet FFT detector and serde
        # serialization tests, which the default feature set skips.
        run: cargo test --all-features

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JS score-engine tests
        working-directory: web/score
        run: node --test

  build:
    runs-on: ubuntu-latest
    needs: test
    # Only build/deploy the site on pushes to the default branch, not on PRs.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Build WASM
        run: make build

      - name: Disable Jekyll
        run: touch web/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

# Choir-training core-loop smoke test (GitHub issue #51).
#
# Serves the training-prototype app headlessly with Playwright/Chromium and
# runs training-prototype/tests/smoke.mjs, which drives: page load -> a
# built-in piece parses & renders -> Play advances the cursor -> Stop resets
# -> piece switching still works -- asserting zero unexpected console/page
# errors or failed requests along the way. See smoke.mjs's header comment
# for the full design rationale (in particular: only ONE of the app's 5
# "built-in" pieces has MusicXML actually committed to git — the other 4 are
# gitignored copyrighted OMR/vector extractions — so the piece-switching
# assertion degrades gracefully in CI; it does not fabricate a second piece).
#
# The OMR library (training-prototype/omr/out/**, manifest.json) is
# gitignored, so this workflow — like any fresh checkout — has none of it;
# the smoke test only ever touches the 5 registered built-ins, and only
# `control` is guaranteed to have real content here.
name: Choir Training Smoke

on:
  push:
    branches: [main, choir-training]
  pull_request:
    branches: [main, choir-training]

concurrency:
  group: training-smoke-${{ github.ref }}
  cancel-in-progress: true

# Pin the Playwright *package* version so `npx playwright install` fetches a
# browser build that matches the driver we import in smoke.mjs. Bump both
# together if this is ever upgraded.
env:
  PLAYWRIGHT_VERSION: "1.59.1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # web/training is a committed symlink (mode 120000) to ../training-prototype
      # so the app is reachable at the same relative path production serves it
      # from. actions/checkout on Linux runners materializes git symlinks as
      # real symlinks, but this step verifies it rather than assuming it, and
      # falls back to serving training-prototype/ directly (per issue #51) if
      # it ever doesn't.
      - name: Resolve app base path
        id: base
        run: |
          if [ -L web/training ] && [ -e web/training/index.html ]; then
            echo "web/training resolved as a real symlink to training-prototype — serving through it."
            echo "path=/web/training/index.html" >> "$GITHUB_OUTPUT"
          else
            echo "web/training did not materialize as a working symlink — falling back to training-prototype/ directly."
            echo "path=/training-prototype/index.html" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: Install Playwright
        run: |
          npm install --no-save "playwright@${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 8765 > /tmp/training-smoke-server.log 2>&1 &
          echo $! > /tmp/training-smoke-server.pid
          url="http://localhost:8765${{ steps.base.outputs.path }}"
          for i in $(seq 1 30); do
            if curl -sf "$url" -o /dev/null; then
              echo "server is up at $url"
              exit 0
            fi
            sleep 1
          done
          echo "server never came up serving $url"
          cat /tmp/training-smoke-server.log
          exit 1

      - name: Run smoke test
        env:
          SMOKE_URL: http://localhost:8765${{ steps.base.outputs.path }}
          PW_PATH: ${{ github.workspace }}/node_modules/playwright/index.js
        run: node training-prototype/tests/smoke.mjs

      - name: Stop static server
        if: always()
        run: kill "$(cat /tmp/training-smoke-server.pid)" 2>/dev/null || true

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-smoke-failure
          path: training-prototype/tests/smoke-failure.png
          if-no-files-found: ignore

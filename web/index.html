<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byzorgan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header">
  <h1>Byzorgan</h1>
  <span id="audio-status" class="audio-status audio-off" title="Click or press a key to start audio">&#9654; Audio off</span>
</header>

<div id="app-body">

  <!-- Controls sidebar -->
  <aside id="controls-panel">
    <div class="control-group">
      <h2>Scale Preset</h2>
      <div id="preset-buttons"></div>
    </div>

    <div class="control-group">
      <h2>Reference Ni</h2>
      <label for="ni-hz-slider">
        <span id="ni-hz-display">261.63</span> Hz
      </label>
      <input type="range" id="ni-hz-slider" min="200" max="550" step="0.01" value="261.63">
    </div>

    <div class="control-group">
      <h2>Viewport</h2>
      <div class="viewport-btns">
        <button class="viewport-btn" id="shift-up-btn" title="Shift up">▲</button>
        <button class="viewport-btn" id="shift-down-btn" title="Shift down">▼</button>
      </div>
    </div>

    <div class="control-group">
      <button id="reset-btn">Reset Grid</button>
    </div>

    <div class="control-group" id="ison-controls">
      <h2>Ison Drone</h2>
      <div class="ison-row">
        <button id="ison-toggle-btn" class="ison-btn">Off</button>
        <select id="ison-degree-select">
          <option value="Ni">Ni</option>
          <option value="Pa">Pa</option>
          <option value="Vou">Vou</option>
          <option value="Ga">Ga</option>
          <option value="Di">Di</option>
          <option value="Ke">Ke</option>
          <option value="Zo">Zo</option>
        </select>
        <select id="ison-octave-select">
          <option value="-1">-1</option>
          <option value="0" selected>0</option>
          <option value="1">+1</option>
        </select>
      </div>
      <label for="ison-volume-slider">Volume</label>
      <input type="range" id="ison-volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="control-group" id="mic-controls">
      <h2>Mic / Correction</h2>
      <div class="mic-row">
        <button id="correction-toggle-btn" class="ison-btn" title="Mix PSOLA-corrected voice into the synth output">Off</button>
        <span class="mic-label">Pitch correction</span>
      </div>
      <label for="correction-volume-slider">Wet mix</label>
      <input type="range" id="correction-volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="control-group">
      <h2>Save Preset</h2>
      <input type="text" id="preset-name-input" placeholder="preset name…">
      <button id="save-btn">Save</button>
    </div>

    <div class="control-group">
      <h2>Saved Presets</h2>
      <div id="saved-presets-list"></div>
    </div>
  </aside>

  <div id="main-content">

    <!-- Scale ladder + singscope -->
    <div id="main-view">
      <div id="ladder-container">
        <canvas id="scale-ladder"></canvas>
      </div>
      <canvas id="singscope"></canvas>
    </div>

    <!-- Pthora + shading palettes -->
    <div id="palettes">
      <div class="palette-section">
        <h3>Pthora</h3>
        <div id="pthora-palette"></div>
      </div>
      <div class="palette-section">
        <h3>Shading</h3>
        <div id="shading-palette"></div>
      </div>
    </div>

  </div><!-- main-content -->

</div><!-- app-body -->

<!-- Accidental popup -->
<div id="accidental-popup">
  <div class="acc-btns" id="acc-preset-btns"></div>
  <div class="acc-custom-row">
    <input type="number" id="acc-custom-input" step="2" placeholder="±N">
    <button id="acc-custom-apply">Set</button>
  </div>
  <button id="acc-clear-btn">Clear accidental</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chant CNN · train glyph classifier</title>
<style>
  @font-face {
    font-family: 'Neanes';
    src: url('../fonts/neanes/Neanes.otf') format('opentype');
    font-display: block;
  }
  body { margin: 0; font: 14px system-ui, sans-serif; background: #1c1f24; color: #e5e7eb; }
  header { padding: 12px 16px; border-bottom: 1px solid #2c313a; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  main { max-width: 600px; margin: 24px auto; padding: 0 16px; }
  .card { background: #232830; border: 1px solid #2c313a; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 12px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #9aa3af; }
  label { display: block; margin: 8px 0; font-size: 13px; color: #cbd2da; }
  label input { width: 100%; box-sizing: border-box; background: #1a1d22; color: #e5e7eb; border: 1px solid #353b45; border-radius: 4px; padding: 8px 10px; font: inherit; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button { background: #3b82f6; color: white; border: 0; border-radius: 5px; padding: 10px 16px; font: inherit; font-weight: 500; cursor: pointer; margin-right: 8px; margin-top: 4px; }
  button[disabled] { background: #4b5360; cursor: not-allowed; }
  button.secondary { background: #353b45; }
  .status { font-size: 12px; color: #9aa3af; margin-top: 8px; line-height: 1.6; }
  progress { width: 100%; margin-top: 8px; height: 6px; border-radius: 3px; }
  progress::-webkit-progress-bar { background: #1a1d22; border-radius: 3px; }
  progress::-webkit-progress-value { background: #3b82f6; border-radius: 3px; }
  pre { font: 12px ui-monospace, monospace; color: #cbd2da; white-space: pre-wrap; background: #1a1d22; padding: 12px; border-radius: 4px; }
  .hint { font-size: 12px; color: #6b7280; }
</style>
</head>
<body>
<header>
  <h1>Chant CNN · train glyph classifier</h1>
</header>
<main>
  <div class="card">
    <h2>1. Generate training data</h2>
    <p class="hint">Renders every Neanes font glyph at 48×48px with rotation, blur, and noise augmentation.</p>
    <div class="row">
      <label>Samples per class <input id="samplesPerClass" type="number" value="8" min="2" max="50"></label>
    </div>
    <button id="genBtn">Generate Data</button>
    <div class="status" id="genStatus"><span id="fontStatus">Loading font…</span></div>
  </div>

  <div class="card">
    <h2>2. Train CNN</h2>
    <p class="hint">Small CNN: Conv32→Conv64→Conv128→GAP→Dropout→Dense. ~200K params.</p>
    <div class="row">
      <label>Epochs <input id="epochs" type="number" value="30" min="5" max="200"></label>
      <label>Batch size <input id="batchSize" type="number" value="32" min="8" max="128"></label>
    </div>
    <button id="trainBtn" disabled>Train</button>
    <progress id="trainProgress" value="0" max="100"></progress>
    <div class="status" id="trainStatus"></div>
  </div>

  <div class="card">
    <h2>3. Export</h2>
    <button id="downloadBtn" disabled class="secondary">Download Model (TFJS)</button>
    <button id="testBtn" disabled class="secondary">Quick Test (5 glyphs)</button>
    <pre id="testResults"></pre>
  </div>
</main>
<script type="module" src="train/train_ui.js"></script>
</body>
</html>
